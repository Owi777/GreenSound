{% extends "base.html" %}

{% block title %}Kontakti - GreenSound{% endblock %}

{% block content %}
<section class="page">
    <div class="content-card">
        <h1>Sazinies ar mums</h1>
        <p>Vai tev ir jautājumi par austiņām? Sazinies ar mums vai izmanto čatbotu.</p>

        <form action="/submit_contact" method="POST">
            <input type="text" name="name" placeholder="Tavs vārds" required>
            <input type="email" name="email" placeholder="Tavs ēpasts" required>
            <textarea name="message" placeholder="Tava ziņa" required></textarea>
            <button type="submit">Sūti ziņu</button>
        </form>

        
        <div class="chatbot-box">
            <h2>GreenSound čatbots</h2>

            <div id="chat-messages" class="chat-messages">
                <div class="message bot">
                    Sveiki! Jautājiet man par cenu, piegādi vai baterijas darbības laiku.
                </div>
            </div>

            <div class="chat-input">
                <input type="text" id="userMessage" placeholder="Ieraksti jautājumu...">
                <button onclick="sendMessage()">Sūtīt</button>
            </div>
        </div>

    </div>
</section>

<script>
const input = document.getElementById("userMessage");

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        event.preventDefault();
        sendMessage();
    }
});

async function sendMessage() {
    const chat = document.getElementById("chat-messages");
    const message = input.value.trim();

    if (!message) return;

    chat.innerHTML += `
        <div class="message user">
            <span class="avatar">👤</span> ${message}
        </div>
    `;

    input.value = "";

    const typingId = "typing-" + Date.now();

    chat.innerHTML += `
        <div class="message bot typing" id="${typingId}">
            <span class="avatar">🤖</span> Bots raksta...
        </div>
    `;

    chat.scrollTop = chat.scrollHeight;

    try {
        const response = await fetch("https://martins123777.app.n8n.cloud/webhook/greensound-chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        });

        const data = await response.json();
        const botReply = data.reply || "Nav atbildes";

        document.getElementById(typingId).innerHTML = `
            <span class="avatar">🤖</span> ${botReply}
        `;

        chat.scrollTop = chat.scrollHeight;

    } catch (error) {
        document.getElementById(typingId).innerHTML = `
            <span class="avatar">🤖</span> Kļūda savienojumā.
        `;
        console.error(error);
    }
}
</script>
{% endblock %}
